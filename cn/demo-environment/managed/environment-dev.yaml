apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: environment-dev
  namespace: cn-data-plane-system
spec:
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  project: cn
  source:
    path: envs/dev
    repoURL: https://github.com/Romanecek/argo-clusterResourceWhitelist-test.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true